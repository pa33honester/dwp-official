name: Build and deploy static site via lftp

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build static export
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via lftp (single FTPS mirror)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          FTP_PORT: ${{ vars.FTP_PORT || 21 }}
        run: |
          lftp -p "$FTP_PORT" -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<LFTP
            set ftp:ssl-allow true
            set ftp:ssl-protect-data false
            set ftp:ssl-force true
            set ftp:passive-mode on
            set ssl:verify-certificate no
            set net:connection-limit 2
            set net:max-retries 6
            set net:reconnect-interval-base 20
            set net:reconnect-interval-multiplier 1.5
            set net:reconnect-interval-max 120
            set net:timeout 60
            set net:idle 30
            set cmd:fail-exit yes
            set mirror:use-pget-n 0
            cd "$FTP_SERVER_DIR"
            mirror --reverse --delete --verbose --parallel=2 \
              --exclude-glob '.well-known/*' \
              --exclude-glob 'cgi-bin/*' \
              --exclude-glob '.htaccess' \
              ./out/ ./
            bye
          LFTP

      - name: Verify deployment
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://dwpofficial.org' }}
        run: |
          set -e
          fail=0
          for path in / /about-us/ /services/ /blog/ /digital-asset-custody/ /admin/ /login/; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL$path")
            printf "%-3s  %s\n" "$code" "$path"
            [ "$code" = "200" ] || fail=1
          done
          for path in /dwp-logo.jpeg /team/max-kahn.jpg /blog/max-kahn-ceo.jpg; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL$path")
            printf "%-3s  %s\n" "$code" "$path"
            [ "$code" = "200" ] || fail=1
          done
          if [ "$fail" != "0" ]; then
            echo "::error::Deployment incomplete — one or more routes/assets are missing"
            exit 1
          fi
          echo "All checked routes and assets are live."

name: Build and deploy static site via FTP

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build static export
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
        run: npm run build

      - name: Deploy via FTP (delta sync)
        id: deploy
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          port: ${{ vars.FTP_PORT || 21 }}
          local-dir: ./out/
          # state-name persists a manifest on the server; subsequent runs
          # only re-upload files whose hashes changed. Single FTPS connection
          # so we stay well under cPanel's 8-conn cap.
          state-name: .ftp-deploy-sync-state.json
          log-level: verbose
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Retry FTP deploy (delta sync)
        if: steps.deploy.outcome == 'failure'
        id: deploy_retry
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          port: ${{ vars.FTP_PORT || 21 }}
          local-dir: ./out/
          state-name: .ftp-deploy-sync-state.json
          log-level: verbose
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Force-upload subdirectory image assets via curl
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          FTP_PORT: ${{ vars.FTP_PORT || 21 }}
        run: |
          # Belt-and-suspenders: FTP-Deploy-Action's state cache sometimes
          # records subdirectory image uploads as "done" when they actually
          # failed during a prior partial deploy, so subsequent runs skip
          # them and the images stay 404. Direct curl upload of every
          # image file in /team and /blog runs in seconds and is
          # idempotent — re-uploads overwrite existing files cleanly.
          set -e
          base="${FTP_SERVER_DIR#./}"
          base="${base%/}"
          [ -n "$base" ] && base="$base/"

          upload() {
            local local_path="$1"
            local remote_path="$2"
            printf "  %s\n" "$remote_path"
            curl --silent --show-error --fail --max-time 90 \
              --ssl-reqd --insecure \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              --ftp-create-dirs \
              -T "$local_path" \
              "ftp://${FTP_SERVER}:${FTP_PORT}/${base}${remote_path}"
          }

          cd out
          for f in team/*.jpg blog/*.jpg; do
            [ -f "$f" ] && upload "$f" "$f"
          done

      - name: Verify deployment
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://dwpofficial.org' }}
        run: |
          set -e
          fail=0
          # HTML routes
          for path in / /about-us/ /services/ /blog/ /digital-asset-custody/; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL$path")
            printf "%-3s  %s\n" "$code" "$path"
            [ "$code" = "200" ] || fail=1
          done
          # Critical assets that must be present
          for path in /dwp-logo.jpeg /team/max-kahn.jpg /blog/max-kahn-ceo.jpg; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL$path")
            printf "%-3s  %s\n" "$code" "$path"
            [ "$code" = "200" ] || fail=1
          done
          if [ "$fail" != "0" ]; then
            echo "::error::Deployment incomplete — one or more routes/assets are missing"
            exit 1
          fi
          echo "All checked routes and assets are live."

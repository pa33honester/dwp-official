name: Build and deploy static site via FTP

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build static export
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via lftp (FTPS, parallel mirror with auto-reconnect)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          FTP_PORT: ${{ vars.FTP_PORT || 21 }}
        run: |
          lftp -p "$FTP_PORT" -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<LFTP
            set ftp:ssl-allow true
            set ftp:ssl-protect-data true
            set ftp:ssl-force true
            set ssl:verify-certificate no
            set net:max-retries 5
            set net:reconnect-interval-base 10
            set net:reconnect-interval-multiplier 1.5
            set net:timeout 30
            set net:idle 30
            set mirror:parallel-transfer-count 4
            set xfer:clobber yes
            mirror --reverse --delete --verbose --parallel=4 \
              --exclude-glob .git \
              --exclude-glob node_modules/ \
              ./out/ "$FTP_SERVER_DIR"
            bye
          LFTP

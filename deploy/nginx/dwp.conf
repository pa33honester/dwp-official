# /etc/nginx/sites-available/dwp.conf
# After copying:  sudo ln -s /etc/nginx/sites-available/dwp.conf /etc/nginx/sites-enabled/
# Then:           sudo nginx -t && sudo systemctl reload nginx
# TLS:            sudo certbot --nginx -d dwpofficial.net -d www.dwpofficial.net

# Trust headers from Cloudflare / your CDN if you have one in front (uncomment as needed):
# real_ip_header CF-Connecting-IP;
# set_real_ip_from 173.245.48.0/20;

upstream dwp_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS redirect (certbot will rewrite this once TLS is issued)
server {
    listen 80;
    listen [::]:80;
    server_name dwpofficial.net www.dwpofficial.net;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dwpofficial.net www.dwpofficial.net;

    # Certbot will fill these in:
    # ssl_certificate     /etc/letsencrypt/live/dwpofficial.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dwpofficial.net/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Reasonable client body limit (forms only — adjust if you add file uploads)
    client_max_body_size 1m;

    # Cache hashed Next.js static assets aggressively
    location /_next/static/ {
        proxy_pass http://dwp_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public assets in /public
    location /favicon.ico {
        proxy_pass http://dwp_app;
        access_log off;
        expires 7d;
    }

    # Everything else proxies to Next.js
    location / {
        proxy_pass http://dwp_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }
}
